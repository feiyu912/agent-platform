name: regex
label: 正则匹配
description: Count or preview deterministic regular expression matches in provided text using Go RE2 syntax. This tool is read-only, works only on the supplied text, and is useful when exact counting or capture extraction must not rely on model estimation.
submitResultFormat: json-compact
type: function
inputSchema:
  type: object
  properties:
    operation:
      type: string
      enum:
        - count
        - matches
      description: Required. Operation to run. Use count for exact total matches, or matches to return match previews with byte offsets and capture groups.
    text:
      type: string
      description: Required. Text to match against. To inspect a file, read it first with file_read and pass the returned content here.
    pattern:
      type: string
      description: Required. Go RE2 regular expression pattern. Lookaround and backreferences are not supported.
    case_insensitive:
      type: boolean
      description: Match case-insensitively by applying the RE2 (?i) flag to the pattern.
    limit:
      type: integer
      description: Maximum number of match previews to return. Defaults to 100. Count still includes all matches.
  required:
    - operation
    - text
    - pattern
  additionalProperties: false
