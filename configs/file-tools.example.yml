# File tools preset. Runtime config is loaded from configs/file-tools.yml at startup.

# read / grep 使用的工作目录；相对路径会基于此目录解析。
working-directory: .

# read 与 grep 允许的路径白名单（前缀匹配）。
# 越权路径不会硬拒，而是触发 HITL approval（approve / approve_rule_run / reject）。
allowed-read-paths:
  - .
  - /tmp

# write 允许的路径白名单（前缀匹配）。
# 同样支持 HITL approval 兜底。建议默认比读权限更严。
allowed-write-paths:
  - .
  - /tmp

max-read-bytes: 1048576
max-write-bytes: 1048576
max-batch-ops: 20

# write 开启时先走人工审批（fingerprint + ruleKey 双层）。
require-write-approval: true

# write 前必须先 read，防止基于陈旧视图覆盖。
require-read-before-write: true
