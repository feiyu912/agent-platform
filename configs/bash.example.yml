# Host shell config. Path policy: configs/access-policy.yml.
#
# Advanced fields:
# - working-directory: default cwd when callers do not pass cwd. This is not a path permission rule.
# - shell-features-enabled: true allows shell syntax such as &&, pipes, and redirects; false only allows simple allowlisted commands.
# - shell-executable/shell-args: host shell override. Unix/macOS default is bash -lc "{{command}}"; Windows default is PowerShell.

# Default preset: allow common developer commands.
allowed-commands: ls,pwd,cat,head,tail,top,free,df,git,rg,find,echo,printf,sed,awk,grep,wc,sort,uniq,tr,cut,xargs,cd,stat,file,du,test,which,mkdir,touch,cp,mv,rm,ln,chmod,env,date,bash,sh,make,go,npm,yarn,pnpm,node,python,python3,pip,curl,wget
shell-timeout-ms: 30000
max-command-chars: 16000

# Strict preset: keep common commands but disable shell syntax.
# allowed-commands: ls,pwd,cat,head,tail,top,free,df,git,rg,find,echo,printf,sed,awk,grep,wc,sort,uniq,tr,cut,xargs,cd,stat,file,du,test,which,mkdir,touch,cp,mv,rm,ln,chmod,env,date,bash,sh,make,go,npm,yarn,pnpm,node,python,python3,pip,curl,wget
# shell-features-enabled: false
# shell-timeout-ms: 20000
# max-command-chars: 24000

# Command-open preset: only opens the command allowlist. Paths stay in access-policy.yml.
# allowed-commands: '*'
# shell-features-enabled: true
# shell-timeout-ms: 30000
# max-command-chars: 32000

# Unix/macOS shell override example.
# shell-executable: bash
# shell-args:
