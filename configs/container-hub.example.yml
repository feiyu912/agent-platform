base-url: ${CONTAINER_HUB_BASE_URL:http://host.docker.internal:11960}

# 可选覆盖；不配置时使用代码默认值。
# default-environment-id:
# request-timeout-ms: 300000
# default-sandbox-level: run
# agent-idle-timeout-ms: 600000
# destroy-queue-delay-ms: 5000

# 默认挂载来自 runtime 全局目录配置：
# /workspace -> CHATS_DIR/<chatId> (rw)
# /root      -> ROOT_DIR (rw)
# /skills    -> AGENTS_DIR/<agentKey>/skills (ro, only run/agent; global skips it)
# /pan       -> PAN_DIR (rw)
# /agent     -> AGENTS_DIR/<agentKey> (ro, required)
# /owner     -> OWNER_DIR (ro)
# /memory    -> MEMORY_DIR/<agentKey> (ro)
#
# runtimeConfig.extraMounts 支持：
# platform + mode             -> 按需平台挂载；skills-market 显式挂到 /skills-market
# destination + mode          -> 覆盖默认挂载模式
# source + destination + mode -> 新增自定义挂载
